<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หน้าหลัก - SUT Teebad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --court-blue: #1C6E8C; --court-blue-dark: #154F65; --court-green: #2D6A4F;
    --cork-orange: #E0762F; --cork-orange-dark: #C25F1F; --feather-cream: #FAF6EC;
    --card-cream: #FFFDF8; --ink: #18241F; --muted: #6B7D74; --line: #DEDACD;
    --line-white: #FFFFFF; --radius-lg: 16px; --shadow-sm: 0 1px 2px rgba(24,36,31,0.08);
    --shadow-md: 0 6px 18px rgba(24,36,31,0.10);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{ background: var(--feather-cream); color: var(--ink); font-family: "Noto Sans Thai", sans-serif; font-size: 15px; line-height: 1.55; }
  h1,h2,h3, button, .chip, .badge, .nav-label{ font-family: "Chakra Petch", sans-serif; }
  button{ font-size: 14px; cursor: pointer; }
  input, select, textarea{ font-family: "Noto Sans Thai", sans-serif; font-size: 14.5px; }

  .wrap{ max-width: 980px; margin: 0 auto; padding: 0 16px 64px; }
  .hero{ padding: 28px 16px 16px; max-width: 980px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;}
  .hero-title{ font-size: clamp(24px, 5vw, 32px); font-weight: 700; margin: 0; color: var(--court-blue-dark); }
  .hero-title span{ color: var(--cork-orange); }
  
  .user-bar { display: flex; align-items: center; gap: 12px; }
  
  .net-divider{ height: 22px; background-color: var(--court-green); background-image: linear-gradient(45deg, rgba(255,255,255,0.55) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.55) 75%), linear-gradient(45deg, rgba(255,255,255,0.55) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.55) 75%); background-size: 14px 14px; background-position: 0 0, 7px 7px; border-top: 4px solid var(--line-white); margin-bottom: 22px; }

  .panel{ background: var(--card-cream); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
  .row{ display:flex; flex-wrap:wrap; gap:10px; align-items: center; }
  .row + .row{ margin-top: 10px; }
  .nav-label{ font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-right: 4px; }

  select, .text-input{ border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 9px 10px; color: var(--ink); }
  .chip{ border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 999px; padding: 8px 14px; font-weight: 600; font-size: 13.5px; transition: background .15s, color .15s, border-color .15s; }
  .chip[aria-pressed="true"]{ background: var(--court-blue); border-color: var(--court-blue); color: #fff; }
  .chip.chip-green { background: var(--court-green); border-color: var(--court-green); color: white; cursor: default; }
  .chip.chip-orange { background: var(--cork-orange); border-color: var(--cork-orange); color: white; }

  .btn{ border: none; border-radius: 9px; padding: 10px 16px; font-weight: 600; transition: transform .08s ease; }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{ background: var(--cork-orange); color: #fff; }
  .btn-primary:hover{ background: var(--cork-orange-dark); }
  .btn-secondary{ background: transparent; border: 1.5px solid var(--court-blue); color: var(--court-blue-dark); }
  .btn-ghost{ background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .btn-sm{ padding: 6px 12px; font-size: 13px; border-radius: 7px; }
  .btn:disabled{ opacity: 0.6; cursor: not-allowed; }

  .spacer{ flex: 1 1 auto; }
  .hidden{ display:none !important; }
  #create-panel h2{ margin: 0 0 4px; font-size: 19px; color: var(--court-blue-dark); }
  .form-note{ font-size: 13px; color: var(--muted); margin: 0 0 16px; }
  .form-grid{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column: 1 / -1; }
  .field label{ font-size: 13px; font-weight: 600; }
  textarea{ resize: vertical; min-height: 64px; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; width: 100%; }

  .type-toggle{ display:flex; gap:10px; }
  .type-toggle label{ flex:1; border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 12px; cursor:pointer; font-size: 13.5px; font-weight: 600; text-align:center; color: var(--muted); }
  .type-toggle input{ display:none; }
  .type-toggle label:has(input:checked).t-need{ border-color: var(--court-green); background: rgba(45,106,79,0.08); color: var(--court-green); }
  .type-toggle label:has(input:checked).t-find{ border-color: var(--cork-orange); background: rgba(224,118,47,0.10); color: var(--cork-orange-dark); }
  .form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 16px; }

  .status-bar{ display:flex; align-items:baseline; gap:8px; margin: 4px 4px 14px; }
  .status-bar .count{ font-weight: 700; color: var(--court-blue-dark); }

  .post-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card{ background: var(--card-cream); border: 1px solid var(--line); border-left: 5px solid var(--court-green); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); display:flex; flex-direction:column; gap: 10px; }
  .card.type-find{ border-left-color: var(--cork-orange); }
  
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .badge{ display:inline-flex; align-items:center; font-weight:700; font-size: 11.5px; padding: 4px 9px; border-radius: 999px; color:#fff; }
  .badge.type-need{ background: var(--court-green); }
  .badge.type-find{ background: var(--cork-orange); }
  .venue{ font-size: 16.5px; font-weight: 700; margin: 0; }
  .area{ font-size: 12.5px; color: var(--muted); margin: -4px 0 0; }
  .meta-row{ display:flex; flex-wrap:wrap; gap: 8px; font-size: 13px; }
  .meta-item{ display:flex; align-items:center; gap:5px; background: rgba(28,110,140,0.07); padding: 4px 9px; border-radius: 7px; }
  .level-pill{ font-size: 11.5px; font-weight: 700; color:#fff; padding: 3px 9px; border-radius: 999px; }
  .card-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:12px; border-top: 1px dashed var(--line); flex-wrap: wrap; gap: 10px; }
  .actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{ background:#fff; border:1px solid var(--line); border-radius: 8px; padding: 5px 7px; color: var(--muted); display:flex; align-items:center; justify-content:center; cursor: pointer; }
  .icon-btn:hover{ color: #b33; border-color:#b33; }
  .empty, .loading{ text-align:center; padding: 48px 20px; color: var(--muted); background: var(--card-cream); border: 1px dashed var(--line); border-radius: var(--radius-lg); }
  
  .toast{ position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(8px); background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13.5px; opacity: 0; transition: opacity .2s, transform .2s; z-index: 50; }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Modals */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(24,36,31,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-box { background: var(--card-cream); padding: 20px; border-radius: var(--radius-lg); width: 90%; max-width: 450px; box-shadow: var(--shadow-md); display: flex; flex-direction: column; }
  
  /* Comments Modal Specifics */
  #comment-list-modal { flex: 1; overflow-y: auto; margin-bottom: 12px; border: 1px solid var(--line); border-radius: 8px; padding: 12px; background: #fff; display: flex; flex-direction: column; gap: 8px; }
  .comment-item { font-size: 13.5px; line-height: 1.4; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }
  .comment-item:last-child { border-bottom: none; padding-bottom: 0; }
  .comment-item b { color: var(--court-blue-dark); font-size: 13px; }
  .comment-item span.time { font-size: 11px; color: var(--muted); margin-left: 6px; }

  .req-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 10px; background: #fff; }
</style>
</head>
<body style="display: none;">

<header class="hero">
  <h1 class="hero-title">SUT Teebad <span>🏸</span></h1>
  <div class="user-bar">
    <span class="chip chip-green" id="user-display">👤 กำลังโหลด...</span>
    <button type="button" id="btn-logout" class="btn btn-ghost btn-sm">ออกจากระบบ</button>
  </div>
</header>
<div class="net-divider"></div>

<div class="wrap">
  <section class="panel">
    <div class="row">
      <span class="nav-label">ประเภท</span>
      <button type="button" class="chip" data-type="all" aria-pressed="true">ทั้งหมด</button>
      <button type="button" class="chip" data-type="need_players" aria-pressed="false">ก๊วนหาคน</button>
      <button type="button" class="chip" data-type="find_group" aria-pressed="false">หาก๊วนตี</button>
      <button type="button" class="chip chip-orange" data-type="my_posts" aria-pressed="false">⭐ โพสต์ของฉัน</button>
      <span class="spacer"></span>
      <span class="nav-label">เรียงตาม</span>
      <select id="sort-select" class="text-input">
        <option value="newest">โพสต์ล่าสุด</option>
      </select>
    </div>
    <div class="row">
      <span class="nav-label">ระดับมือ</span>
      <select id="level-filter" class="text-input"></select>
      <span class="spacer"></span>
      <button type="button" id="toggle-create" class="btn btn-primary">+ ลงประกาศหาก๊วน/หาคน</button>
    </div>
  </section>

  <section class="panel hidden" id="create-panel">
    <h2>ลงประกาศใหม่</h2>
    <form id="post-form">
      <div class="field full">
        <label>ประเภทประกาศ</label>
        <div class="type-toggle">
          <label class="t-need"><input type="radio" name="postType" value="need_players" checked onchange="toggleFormFields()" /><span>🏸 ก๊วนหาคน</span></label>
          <label class="t-find"><input type="radio" name="postType" value="find_group" onchange="toggleFormFields()" /><span>🔎 หาก๊วนตี</span></label>
        </div>
      </div>
      <div class="form-grid">
        <div class="field full" id="venue-field"><label id="venue-label">ชื่อสนาม/สถานที่</label><input name="venue" id="f-venue" class="text-input" type="text" required placeholder="เช่น ยิม 2 คอร์ท 7" /></div>
        <div class="field" id="area-field"><label>ยิม/สถานที่</label><select name="areaId" id="f-area" class="text-input" required></select></div>
        <div class="field"><label>ระดับมือ</label><select name="level" id="f-level" class="text-input" required></select></div>
        <div class="field"><label>วันที่</label><input name="date" id="f-date" class="text-input" type="date" required /></div>
        <div class="field"><label>เวลา</label><input name="time" class="text-input" type="text" placeholder="เช่น 18:00–20:00" /></div>
        <div class="field"><label id="f-people-label">ต้องการคนเพิ่ม?</label><input name="peopleNeeded" class="text-input" type="number" min="1" required value="2" /></div>
        <div class="field"><label>ชื่อเรียกของคุณ</label><input name="nickname" class="text-input" type="text" required placeholder="ชื่อเล่น หรือรหัส นศ." /></div>
        <div class="field full"><label>ช่องทางติดต่อ</label><input name="contact" class="text-input" type="text" required /></div>
        <div class="field full"><label>รายละเอียดเพิ่มเติม</label><textarea name="details"></textarea></div>
      </div>
      <div class="form-actions">
        <button type="button" id="cancel-create" class="btn btn-ghost">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">ลงประกาศ</button>
      </div>
    </form>
  </section>

  <section>
    <div class="status-bar"><span class="count" id="result-count">—</span></div>
    <div class="loading" id="loading-state">กำลังโหลดประกาศ...</div>
    <div class="empty hidden" id="empty-state"><h3>ยังไม่มีประกาศ</h3><button class="btn btn-primary" id="empty-cta" onclick="document.getElementById('toggle-create').click()">+ ลงประกาศเลย</button></div>
    <div class="post-grid hidden" id="post-list"></div>
  </section>
</div>

<div class="modal-overlay" id="req-modal">
  <div class="modal-box">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="margin:0; color:var(--court-blue-dark);">จัดการคำขอเข้าร่วม</h3>
      <button type="button" onclick="closeRequestsModal()" class="icon-btn" style="border:none;">❌</button>
    </div>
    <div id="req-list" style="margin-bottom: 20px; max-height: 50vh; overflow-y:auto;"></div>
  </div>
</div>

<div class="modal-overlay" id="comment-modal">
  <div class="modal-box" style="height: 75vh;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
      <h3 style="margin:0; color:var(--court-blue-dark);">💬 พูดคุยในโพสต์</h3>
      <button type="button" onclick="closeCommentModal()" class="icon-btn" style="border:none;">❌</button>
    </div>
    <div id="comment-list-modal"></div>
    <div style="display:flex; gap:8px; margin-top: 10px;">
      <input type="text" id="modal-comment-input" class="text-input" style="flex:1; margin-bottom:0;" placeholder="พิมพ์ข้อความที่นี่..." onkeypress="if(event.key==='Enter') submitModalComment()" />
      <button type="button" class="btn btn-primary" id="btn-send-comment" onclick="submitModalComment()">ส่ง</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const SUPABASE_URL = 'https://kckdkiyhktvqtibflvrl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtja2RraXloa3R2cXRpYmZsdnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Nzk2NDIsImV4cCI6MjA5ODM1NTY0Mn0.QxjCsXNk-KiM9ItvyCGtH2GkNG84GpNykwuEy6_AKm0';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  let currentUser = null, currentUserRole = 'user';
  let currentUserStudentId = '';

  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) { window.location.href = 'index.html'; } 
    else {
      currentUser = session.user;
      currentUserStudentId = currentUser.email.split('@')[0].toUpperCase();
      
      const { data: profile } = await sb.from('user_profiles').select('role, student_id').eq('id', currentUser.id).single();
      if (profile && profile.role) currentUserRole = profile.role;
      if (profile && profile.student_id) currentUserStudentId = profile.student_id;
      
      const userDisplay = document.getElementById('user-display');
      if (currentUserRole === 'admin') {
          userDisplay.textContent = '👑 Admin: ' + currentUserStudentId;
          userDisplay.style.background = 'var(--cork-orange-dark)';
          userDisplay.style.borderColor = 'var(--cork-orange-dark)';
      } else {
          userDisplay.textContent = '👤 ' + currentUserStudentId;
      }
      document.body.style.display = 'block'; 
      initApp(); 
    }
  });

  document.getElementById('btn-logout').addEventListener('click', async () => { await sb.auth.signOut(); window.location.href = 'index.html'; });

  const AREAS = [ { id:'gym1', name:'ยิม 1 (มทส.)' }, { id:'gym2', name:'ยิม 2 (มทส.)' } ];
  const LEVELS = [ { code:'OPEN', label:'เปิดทุกระดับ' }, { code:'BG', label:'BG · มือใหม่สุดๆ' }, { code:'N', label:'N · มือใหม่' }, { code:'S', label:'S · มือกลาง' }, { code:'P', label:'P · มือกลาง-ดี' }, { code:'C', label:'C · มือดี' }, { code:'B', label:'B · มือเซียน' }, { code:'A', label:'A · มือโปร' } ];

  let allPosts = [], allRequests = [], allComments = [], allProfiles = [], filters = { type:'all', level:'all' };
  let currentOpenModalPostId = null;
  let currentOpenCommentPostId = null;
  
  function showToast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }
  function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function formatTime(isoString) {
      if (!isoString) return '';
      const d = new Date(isoString);
      return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  // ปรับปรุงฟังก์ชันสลับฟอร์ม (เปลี่ยนชื่อ label ของช่องสนาม)
  window.toggleFormFields = function() {
    const isFind = document.querySelector('input[name="postType"]:checked').value === 'find_group';
    const venueLabel = document.getElementById('venue-label');
    const venueInput = document.getElementById('f-venue');

    if (isFind) {
      venueLabel.textContent = 'หัวข้อประกาศ';
      venueInput.placeholder = 'เช่น มี 2 คนค่า มือ BG';
      document.getElementById('area-field').style.display = 'none';
      document.getElementById('f-area').required = false;
    } else {
      venueLabel.textContent = 'ชื่อสนาม/สถานที่';
      venueInput.placeholder = 'เช่น ยิม 2 คอร์ท 7';
      document.getElementById('area-field').style.display = 'flex';
      document.getElementById('f-area').required = true;
    }
    document.getElementById('f-people-label').textContent = isFind ? 'มีสมาชิกในก๊วนกี่คน?' : 'ต้องการคนเพิ่มกี่คน?';
  }

  async function loadData(){
    const [resPosts, resReqs, resComms, resProfs] = await Promise.all([
      sb.from('posts').select('*').order('created_at', { ascending: false }),
      sb.from('join_requests').select('*, user_profiles(student_id)'),
      sb.from('comments').select('*, user_profiles(student_id)').order('created_at', { ascending: true }),
      sb.from('user_profiles').select('id, student_id')
    ]);
    
    if(!resProfs.error) allProfiles = resProfs.data;
    
    if(!resPosts.error) {
        allPosts = resPosts.data.map(r => {
            const authorProf = allProfiles.find(pf => pf.id === r.user_id);
            return { 
                id: r.id, userId: r.user_id, type: r.type, venue: r.venue, areaId: r.area_id, 
                date: r.post_date, time: r.post_time||'', peopleNeeded: r.people_needed, level: r.level, 
                details: r.details||'', nickname: r.nickname, contact: r.contact, 
                authorId: authorProf ? authorProf.student_id : 'ไม่ระบุ'
            };
        });
    }
    if(!resReqs.error) allRequests = resReqs.data;
    if(!resComms.error) allComments = resComms.data;
  }

  function renderFeed(){
    const list = document.getElementById('post-list');
    document.getElementById('loading-state').classList.add('hidden');
    
    // คำนวณวันที่ปัจจุบัน (เพื่อใช้กรองโพสต์เก่าทิ้ง)
    const now = new Date();
    const todayStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;

    let visiblePosts = allPosts.filter(p => {
      // 1. กรองทิ้งหากวันที่ผ่านไปแล้ว
      if (p.date < todayStr) return false;

      // 2. กรองตามประเภท (ทั้งหมด, หาคน, หาก๊วน, ของฉัน)
      let matchType = true;
      if (filters.type === 'my_posts') matchType = (p.userId === currentUser.id);
      else if (filters.type !== 'all') matchType = (p.type === filters.type);
      
      // 3. กรองตามระดับมือ
      let matchLevel = (filters.level === 'all' || filters.level === 'OPEN' || p.level === filters.level);
      
      return matchType && matchLevel;
    });

    if(!visiblePosts.length){
      list.classList.add('hidden'); document.getElementById('empty-state').classList.remove('hidden');
      document.getElementById('result-count').textContent = '0 ประกาศ';
    } else {
      document.getElementById('empty-state').classList.add('hidden'); list.classList.remove('hidden');
      document.getElementById('result-count').textContent = visiblePosts.length + ' ประกาศ';
      
      list.innerHTML = visiblePosts.map(p => {
        const isMine = currentUser && p.userId === currentUser.id;
        const isAdmin = currentUserRole === 'admin';
        const isFind = p.type === 'find_group';
        
        // โควต้าคน
        const postReqs = allRequests.filter(r => r.post_id === p.id);
        const approvedCount = postReqs.filter(r => r.status === 'approved').length;
        const isFull = approvedCount >= p.peopleNeeded;
        const quotaText = `${approvedCount}/${p.peopleNeeded} คน`;

        // คอมเมนต์
        const postComments = allComments.filter(c => c.post_id === p.id);
        const commentCount = postComments.length;

        // ปุ่มจัดการคำขอ / ขอเข้าร่วม
        let featureBtns = '';
        if (isMine) {
            const pendingCount = postReqs.filter(r => r.status === 'pending').length;
            const badge = pendingCount > 0 ? `<span style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10px; margin-left:4px;">${pendingCount}</span>` : '';
            featureBtns = `<button type="button" class="btn btn-secondary btn-sm" onclick="window.openRequestsModal('${p.id}')">จัดการคำขอ ${badge}</button>`;
        } else {
            const myReq = postReqs.find(r => r.requester_id === currentUser.id);
            const btnText = isFind ? 'ชวนมาตี' : 'ขอเข้าร่วม';
            if (!myReq) {
                featureBtns = `<button type="button" class="btn btn-primary btn-sm" onclick="window.requestToJoin('${p.id}', this)" ${isFull ? 'disabled' : ''}>${isFull ? 'เต็มแล้ว' : btnText}</button>`;
            } else if (myReq.status === 'pending') {
                featureBtns = `<button type="button" class="btn btn-ghost btn-sm" disabled>รอการตอบรับ...</button>`;
            } else if (myReq.status === 'approved') {
                featureBtns = `<button type="button" class="btn btn-sm" style="background:var(--court-green); color:white;" disabled>${isFind ? 'ชวนสำเร็จ 🎉' : 'เข้าร่วมแล้ว 🎉'}</button>`;
            } else {
                featureBtns = `<button type="button" class="btn btn-sm" style="background:red; color:white;" disabled>ถูกปฏิเสธ</button>`;
            }
        }

        const areaName = isFind ? 'ไม่ระบุสถานที่ (แจมได้หมด)' : (AREAS.find(a=>a.id===p.areaId)?.name || 'ไม่ระบุ');
        const venueName = escapeHtml(p.venue); // ดึงข้อมูลที่ผู้ใช้กรอกมาแสดงเลย
        
        // ดึงชื่อเต็มของระดับมือ
        const lvObj = LEVELS.find(l => l.code === p.level);
        const levelLabel = lvObj ? lvObj.label : p.level;

        // เช็คว่าไอดีคนโพสต์คือ adminwan หรือไม่ ถ้าใช่ให้ซ่อนรหัสนักศึกษาไว้
        const authorDisplay = (p.authorId.toLowerCase() === 'adminwan') ? '' : ` (${escapeHtml(p.authorId)})`;

        return `<article class="card ${isFind?'type-find':''}">
          <div class="card-top">
             <span class="badge ${isFind?'type-find':'type-need'}">${isFind?'หาก๊วนตี':'ก๊วนหาคน'}</span>
             <span style="font-size:12.5px; font-weight:bold; color: ${isFull?'red':'var(--court-blue-dark)'};">รับแล้ว: ${quotaText}</span>
          </div>
          <p class="venue">${venueName}</p><p class="area">📍 ${areaName}</p>
          <div class="meta-row">
            <span class="meta-item">📅 ${escapeHtml(p.date)}</span>
            <span class="level-pill" style="background:var(--court-blue-dark);">${escapeHtml(levelLabel)}</span>
          </div>
          <p class="contact">ติดต่อ: ${escapeHtml(p.contact)}</p>

          <div class="card-footer">
            <span class="by-line" style="flex:1;">โดย ${escapeHtml(p.nickname)}${authorDisplay}</span>
            <div class="actions">
              <button type="button" class="btn btn-ghost btn-sm" onclick="window.openCommentModal('${p.id}')">💬 คุย (${commentCount})</button>
              ${featureBtns}
              ${(isMine || isAdmin) ? `<button type="button" class="icon-btn" onclick="deletePost('${p.id}')" title="ลบโพสต์">🗑️</button>` : ''}
            </div>
          </div>
        </article>`;
      }).join('');
    }
  }

  // --- Functions ---
  window.deletePost = async function(id) {
    if(confirm('ยืนยันการลบประกาศนี้ใช่ไหม?')) {
      await sb.from('posts').delete().eq('id', id);
      await loadData(); renderFeed(); showToast('ลบประกาศเรียบร้อยแล้ว');
    }
  }

  window.requestToJoin = async function(postId, btnEl) {
    btnEl.disabled = true; btnEl.textContent = 'กำลังส่ง...';
    const { error } = await sb.from('join_requests').insert([{ post_id: postId, requester_id: currentUser.id }]);
    if (error) { showToast('เกิดข้อผิดพลาด'); btnEl.disabled = false; btnEl.textContent = 'ลองใหม่'; } 
    else { showToast('ส่งคำขอเรียบร้อยแล้ว!'); await loadData(); renderFeed(); }
  }

  // --- Modal Requests ---
  window.openRequestsModal = function(postId) {
    currentOpenModalPostId = postId;
    const reqs = allRequests.filter(r => r.post_id === postId);
    const listDiv = document.getElementById('req-list');
    
    if (reqs.length === 0) { listDiv.innerHTML = '<p style="text-align:center; color:var(--muted);">ยังไม่มีคำขอเลยครับ</p>'; } 
    else {
        listDiv.innerHTML = reqs.map(r => {
            const studentId = r.user_profiles?.student_id || 'ไม่ทราบชื่อ';
            let actionBtns = '';
            if (r.status === 'pending') {
                actionBtns = `<button class="btn btn-primary btn-sm" onclick="window.updateReqStatus('${r.id}', 'approved')">รับ</button> <button class="btn btn-ghost btn-sm" onclick="window.updateReqStatus('${r.id}', 'rejected')">ปฏิเสธ</button>`;
            } else {
                actionBtns = r.status === 'approved' ? '<span style="color:var(--court-green); font-weight:bold;">✅ อนุมัติแล้ว</span>' : '<span style="color:red; font-weight:bold;">❌ ปฏิเสธแล้ว</span>';
            }
            return `<div class="req-item"><div><strong>👤 ${escapeHtml(studentId)}</strong></div> <div style="display:flex;gap:5px;align-items:center;">${actionBtns}</div></div>`;
        }).join('');
    }
    document.getElementById('req-modal').classList.add('show');
  }
  window.closeRequestsModal = function() { currentOpenModalPostId = null; document.getElementById('req-modal').classList.remove('show'); }
  window.updateReqStatus = async function(reqId, newStatus) {
    await sb.from('join_requests').update({ status: newStatus }).eq('id', reqId);
    showToast(newStatus === 'approved' ? 'อนุมัติเรียบร้อย!' : 'ปฏิเสธคำขอแล้ว');
    await loadData(); renderFeed();
    if (currentOpenModalPostId) window.openRequestsModal(currentOpenModalPostId);
  }

  // --- Modal Comments ---
  window.openCommentModal = function(postId) {
    currentOpenCommentPostId = postId;
    renderCommentsInModal();
    document.getElementById('comment-modal').classList.add('show');
  }
  window.closeCommentModal = function() { currentOpenCommentPostId = null; document.getElementById('comment-modal').classList.remove('show'); }
  window.renderCommentsInModal = function() {
    if (!currentOpenCommentPostId) return;
    const listDiv = document.getElementById('comment-list-modal');
    const postComments = allComments.filter(c => c.post_id === currentOpenCommentPostId);
    
    if (postComments.length === 0) {
        listDiv.innerHTML = '<div style="text-align:center; color:var(--muted); margin-top:20px;">ยังไม่มีคอมเมนต์ เริ่มคุยกันได้เลย!</div>';
    } else {
        listDiv.innerHTML = postComments.map(c => `
            <div class="comment-item">
               <b>${escapeHtml(c.user_profiles?.student_id || 'User')}</b> 
               <span class="time">${formatTime(c.created_at)}</span>
               <div style="margin-top:2px;">${escapeHtml(c.content)}</div>
            </div>
        `).join('');
        setTimeout(() => { listDiv.scrollTop = listDiv.scrollHeight; }, 10);
    }
  }
  window.submitModalComment = async function() {
    if (!currentOpenCommentPostId) return;
    const input = document.getElementById('modal-comment-input');
    const sendBtn = document.getElementById('btn-send-comment');
    const text = input.value.trim();
    if (!text) return;
    
    input.disabled = true; sendBtn.disabled = true;
    
    // แทรกการดัก Error ไว้เผื่อมีการปิด RLS ไม่สมบูรณ์
    const { error } = await sb.from('comments').insert({ post_id: currentOpenCommentPostId, user_id: currentUser.id, content: text });
    
    input.value = ''; input.disabled = false; sendBtn.disabled = false; input.focus();
    if (!error) {
        await loadData(); renderFeed(); 
        if (currentOpenCommentPostId) renderCommentsInModal();
    } else {
        console.error("Comment Insert Error:", error);
        showToast('เกิดข้อผิดพลาดในการส่ง: โปรดเช็คการตั้งค่า RLS ในฐานข้อมูล');
    }
  }

  async function initApp() {
    document.getElementById('f-area').innerHTML = AREAS.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    const lvOpts = LEVELS.map(l => `<option value="${l.code}">${l.label}</option>`).join('');
    document.getElementById('f-level').innerHTML = lvOpts;
    document.getElementById('level-filter').innerHTML = '<option value="all">ทุกระดับมือ</option>' + lvOpts;
    
    document.querySelectorAll('.chip[data-type]').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('.chip[data-type]').forEach(c => c.setAttribute('aria-pressed', 'false'));
        e.target.setAttribute('aria-pressed', 'true');
        filters.type = e.target.getAttribute('data-type');
        renderFeed();
      });
    });
    document.getElementById('level-filter').addEventListener('change', (e) => { filters.level = e.target.value; renderFeed(); });

    const pnl = document.getElementById('create-panel');
    document.getElementById('toggle-create').onclick = () => { pnl.classList.remove('hidden'); toggleFormFields(); };
    document.getElementById('cancel-create').onclick = () => pnl.classList.add('hidden');
    
    document.getElementById('post-form').addEventListener('submit', async function(ev){
      ev.preventDefault();
      const fd = new FormData(this);
      const isFind = fd.get('postType') === 'find_group';
      const data = {
          user_id: currentUser.id, type: fd.get('postType'),
          venue: fd.get('venue'), // รับค่าที่ผู้ใช้กรอกมา
          area_id: isFind ? null : fd.get('areaId'),
          post_date: fd.get('date'), post_time: fd.get('time') || null, people_needed: fd.get('peopleNeeded'),
          level: fd.get('level'), details: fd.get('details') || null, nickname: fd.get('nickname'), contact: fd.get('contact')
      };
      
      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true; submitBtn.textContent = 'กำลังบันทึก...';
      const { error } = await sb.from('posts').insert([data]);
      submitBtn.disabled = false; submitBtn.textContent = 'ลงประกาศ';
      if (!error){ await loadData(); renderFeed(); pnl.classList.add('hidden'); this.reset(); showToast('ลงประกาศเรียบร้อย 🏸'); }
    });

    await loadData(); renderFeed();
    
    // ระบบ Realtime (อัปเดตแชทและคำขอแบบสดๆ)
    sb.channel('realtime-db').on('postgres_changes', { event: '*', schema: 'public' }, async (payload) => {
        if (payload.table === 'join_requests' && payload.eventType === 'INSERT') {
            const post = allPosts.find(p => p.id === payload.new.post_id);
            if (post && post.userId === currentUser.id) showToast('🔔 มีคำขอ/คำชวนใหม่เข้ามาในโพสต์ของคุณ!');
        }
        await loadData(); renderFeed();
        if (currentOpenModalPostId) window.openRequestsModal(currentOpenModalPostId);
        if (currentOpenCommentPostId) window.renderCommentsInModal();
    }).subscribe();
  }
})();
</script>
</body>
</html>
