<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>หน้าหลัก - SUT Teebad</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --court-blue: #1C6E8C; --court-blue-dark: #154F65; --court-green: #2D6A4F;
    --cork-orange: #E0762F; --cork-orange-dark: #C25F1F; --feather-cream: #FAF6EC;
    --card-cream: #FFFDF8; --ink: #18241F; --muted: #6B7D74; --line: #DEDACD;
    --line-white: #FFFFFF; --radius-lg: 16px; --shadow-sm: 0 1px 2px rgba(24,36,31,0.08);
    --shadow-md: 0 6px 18px rgba(24,36,31,0.10);
  }

  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; }
  body{ background: var(--feather-cream); color: var(--ink); font-family: "Noto Sans Thai", sans-serif; font-size: 15px; line-height: 1.55; }
  h1,h2,h3, button, .chip, .badge, .nav-label{ font-family: "Chakra Petch", sans-serif; }
  button{ font-size: 14px; cursor: pointer; }
  input, select, textarea{ font-family: "Noto Sans Thai", sans-serif; font-size: 14.5px; }

  .wrap{ max-width: 980px; margin: 0 auto; padding: 0 16px 64px; }
  .hero{ padding: 28px 16px 16px; max-width: 980px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px;}
  .hero-title{ font-size: clamp(24px, 5vw, 32px); font-weight: 700; margin: 0; color: var(--court-blue-dark); }
  .hero-title span{ color: var(--cork-orange); }
  
  .user-bar { display: flex; align-items: center; gap: 12px; }
  
  .net-divider{ height: 22px; background-color: var(--court-green); background-image: linear-gradient(45deg, rgba(255,255,255,0.55) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.55) 75%), linear-gradient(45deg, rgba(255,255,255,0.55) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.55) 75%); background-size: 14px 14px; background-position: 0 0, 7px 7px; border-top: 4px solid var(--line-white); margin-bottom: 22px; }

  .panel{ background: var(--card-cream); border: 1px solid var(--line); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
  .row{ display:flex; flex-wrap:wrap; gap:10px; align-items: center; }
  .row + .row{ margin-top: 10px; }
  .nav-label{ font-size: 12px; font-weight: 600; text-transform: uppercase; color: var(--muted); margin-right: 4px; }

  select, .text-input{ border: 1px solid var(--line); background: #fff; border-radius: 8px; padding: 9px 10px; color: var(--ink); }
  .chip{ border: 1px solid var(--line); background: #fff; color: var(--ink); border-radius: 999px; padding: 8px 14px; font-weight: 600; font-size: 13.5px; transition: background .15s, color .15s, border-color .15s; }
  .chip[aria-pressed="true"]{ background: var(--court-blue); border-color: var(--court-blue); color: #fff; }
  .chip.chip-green { background: var(--court-green); border-color: var(--court-green); color: white; cursor: default; }

  .btn{ border: none; border-radius: 9px; padding: 10px 16px; font-weight: 600; transition: transform .08s ease; }
  .btn:active{ transform: scale(0.98); }
  .btn-primary{ background: var(--cork-orange); color: #fff; }
  .btn-primary:hover{ background: var(--cork-orange-dark); }
  .btn-secondary{ background: transparent; border: 1.5px solid var(--court-blue); color: var(--court-blue-dark); }
  .btn-ghost{ background: transparent; color: var(--muted); border: 1px solid var(--line); }
  .btn-sm{ padding: 6px 12px; font-size: 13px; border-radius: 7px; }

  .spacer{ flex: 1 1 auto; }
  .range-wrap{ display:flex; align-items:center; gap:8px; }
  .checkbox-line{ display:flex; align-items:center; gap:6px; font-size: 13.5px; color: var(--muted); }

  .hidden{ display:none !important; }
  #create-panel h2{ margin: 0 0 4px; font-size: 19px; color: var(--court-blue-dark); }
  .form-note{ font-size: 13px; color: var(--muted); margin: 0 0 16px; }
  .form-grid{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 14px; }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column: 1 / -1; }
  .field label{ font-size: 13px; font-weight: 600; }
  .field .hint{ font-size: 12px; color: var(--muted); font-weight: 400; }
  textarea{ resize: vertical; min-height: 64px; border: 1px solid var(--line); border-radius: 8px; padding: 9px 10px; width: 100%; }

  .type-toggle{ display:flex; gap:10px; }
  .type-toggle label{ flex:1; border: 1.5px solid var(--line); border-radius: 10px; padding: 10px 12px; cursor:pointer; font-size: 13.5px; font-weight: 600; text-align:center; color: var(--muted); }
  .type-toggle input{ display:none; }
  .type-toggle label:has(input:checked).t-need{ border-color: var(--court-green); background: rgba(45,106,79,0.08); color: var(--court-green); }
  .type-toggle label:has(input:checked).t-find{ border-color: var(--cork-orange); background: rgba(224,118,47,0.10); color: var(--cork-orange-dark); }
  .form-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top: 16px; }

  .status-bar{ display:flex; align-items:baseline; gap:8px; margin: 4px 4px 14px; }
  .status-bar .count{ font-weight: 700; color: var(--court-blue-dark); }
  .status-bar .note{ color: var(--muted); font-size: 13px; }

  .post-grid{ display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .card{ background: var(--card-cream); border: 1px solid var(--line); border-left: 5px solid var(--court-green); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-sm); display:flex; flex-direction:column; gap: 10px; }
  .card.type-find{ border-left-color: var(--cork-orange); }
  
  .card-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
  .badge{ display:inline-flex; align-items:center; font-weight:700; font-size: 11.5px; padding: 4px 9px; border-radius: 999px; color:#fff; }
  .badge.type-need{ background: var(--court-green); }
  .badge.type-find{ background: var(--cork-orange); }
  .venue{ font-size: 16.5px; font-weight: 700; margin: 0; }
  .area{ font-size: 12.5px; color: var(--muted); margin: -4px 0 0; }
  .meta-row{ display:flex; flex-wrap:wrap; gap: 8px; font-size: 13px; }
  .meta-item{ display:flex; align-items:center; gap:5px; background: rgba(28,110,140,0.07); padding: 4px 9px; border-radius: 7px; }
  .level-pill{ font-size: 11.5px; font-weight: 700; color:#fff; padding: 3px 9px; border-radius: 999px; }
  .details{ font-size: 13.5px; white-space: pre-wrap; word-break: break-word; }
  .contact{ font-size: 13px; color: var(--court-blue-dark); font-weight: 600; }
  .card-footer{ display:flex; align-items:center; justify-content:space-between; margin-top:auto; padding-top:8px; border-top: 1px dashed var(--line); }
  .by-line{ font-size: 12px; color: var(--muted); }
  .actions{ display:flex; gap:8px; align-items:center; }
  .icon-btn{ background:#fff; border:1px solid var(--line); border-radius: 8px; padding: 5px 7px; color: var(--muted); display:flex; align-items:center; cursor: pointer; }
  .icon-btn:hover{ color: #b33; border-color:#b33; }
  .empty, .loading{ text-align:center; padding: 48px 20px; color: var(--muted); background: var(--card-cream); border: 1px dashed var(--line); border-radius: var(--radius-lg); }
  
  .toast{ position: fixed; left: 50%; bottom: 22px; transform: translateX(-50%) translateY(8px); background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 999px; font-size: 13.5px; opacity: 0; transition: opacity .2s, transform .2s; z-index: 50; }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Modal Style */
  .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(24,36,31,0.6); display: flex; justify-content: center; align-items: center; z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: auto; }
  .modal-box { background: var(--card-cream); padding: 24px; border-radius: var(--radius-lg); width: 90%; max-width: 450px; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-md); }
  .req-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border: 1px solid var(--line); border-radius: 10px; margin-bottom: 10px; background: #fff; }
</style>
</head>
<body style="display: none;"> <header class="hero">
  <h1 class="hero-title">SUT Teebad <span>🏸</span></h1>
  <div class="user-bar">
    <span class="chip chip-green" id="user-display">👤 กำลังโหลด...</span>
    <button type="button" id="btn-logout" class="btn btn-ghost btn-sm">ออกจากระบบ</button>
  </div>
</header>
<div class="net-divider"></div>

<div class="wrap">
  <section class="panel">
    <div class="row">
      <span class="nav-label">ประเภท</span>
      <button type="button" class="chip" data-type="all" aria-pressed="true">ทั้งหมด</button>
      <button type="button" class="chip" data-type="need_players" aria-pressed="false">ก๊วนหาคน</button>
      <button type="button" class="chip" data-type="find_group" aria-pressed="false">หาก๊วนตี</button>
      <span class="spacer"></span>
      <span class="nav-label">เรียงตาม</span>
      <select id="sort-select" class="text-input">
        <option value="newest">โพสต์ล่าสุด</option>
      </select>
    </div>
    <div class="row">
      <span class="nav-label">ระดับมือ</span>
      <select id="level-filter" class="text-input"></select>
      <span class="spacer"></span>
      <button type="button" id="toggle-create" class="btn btn-primary">+ ลงประกาศหาก๊วน/หาคน</button>
    </div>
  </section>

  <section class="panel hidden" id="create-panel">
    <h2>ลงประกาศใหม่</h2>
    <form id="post-form">
      <div class="field full">
        <label>ประเภทประกาศ</label>
        <div class="type-toggle">
          <label class="t-need"><input type="radio" name="postType" value="need_players" checked /><span>🏸 ก๊วนหาคน</span></label>
          <label class="t-find"><input type="radio" name="postType" value="find_group" /><span>🔎 หาก๊วนตี</span></label>
        </div>
      </div>
      <div class="form-grid">
        <div class="field full"><label>ชื่อสนาม/สถานที่</label><input name="venue" class="text-input" type="text" required placeholder="เช่น ยิม 2 คอร์ท 7" /></div>
        <div class="field"><label>ยิม/สถานที่</label><select name="areaId" id="f-area" class="text-input" required></select></div>
        <div class="field"><label>ระดับมือ</label><select name="level" id="f-level" class="text-input" required></select></div>
        <div class="field"><label>วันที่</label><input name="date" id="f-date" class="text-input" type="date" required /></div>
        <div class="field"><label>เวลา</label><input name="time" class="text-input" type="text" placeholder="เช่น 18:00–20:00" /></div>
        <div class="field"><label id="f-people-label">ต้องการคนเพิ่ม?</label><input name="peopleNeeded" class="text-input" type="number" min="1" required value="2" /></div>
        <div class="field"><label>ชื่อเรียกของคุณ</label><input name="nickname" class="text-input" type="text" required placeholder="ชื่อเล่น หรือรหัส นศ." /></div>
        <div class="field full"><label>ช่องทางติดต่อ</label><input name="contact" class="text-input" type="text" required /></div>
        <div class="field full"><label>รายละเอียดเพิ่มเติม</label><textarea name="details"></textarea></div>
      </div>
      <div class="form-actions">
        <button type="button" id="cancel-create" class="btn btn-ghost">ยกเลิก</button>
        <button type="submit" class="btn btn-primary">ลงประกาศ</button>
      </div>
    </form>
  </section>

  <section>
    <div class="status-bar"><span class="count" id="result-count">—</span> <span class="note" id="result-note"></span></div>
    <div class="loading" id="loading-state">กำลังโหลดประกาศ...</div>
    <div class="empty hidden" id="empty-state"><h3>ยังไม่มีประกาศ</h3><button class="btn btn-primary" id="empty-cta">+ ลงประกาศเลย</button></div>
    <div class="post-grid hidden" id="post-list"></div>
  </section>
</div>

<div class="modal-overlay" id="req-modal">
  <div class="modal-box">
    <h3 style="margin-top:0; color:var(--court-blue-dark);">จัดการคำขอเข้าร่วม</h3>
    <div id="req-list" style="margin-bottom: 20px;"></div>
    <button type="button" onclick="closeRequestsModal()" class="btn btn-ghost" style="width:100%;">ปิดหน้าต่าง</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  const SUPABASE_URL = 'https://kckdkiyhktvqtibflvrl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtja2RraXloa3R2cXRpYmZsdnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Nzk2NDIsImV4cCI6MjA5ODM1NTY0Mn0.QxjCsXNk-KiM9ItvyCGtH2GkNG84GpNykwuEy6_AKm0';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  
  let currentUser = null;
  let currentUserRole = 'user'; // ตัวแปรเก็บสิทธิ์ Admin

  // 1. เช็ค Auth และดึงสิทธิ์ Admin
  sb.auth.getSession().then(async ({ data: { session } }) => {
    if (!session) {
      window.location.href = 'index.html';
    } else {
      currentUser = session.user;
      const studentId = currentUser.email.split('@')[0].toUpperCase();
      
      // ตรวจสอบว่าเป็น Admin หรือไม่ จากตาราง user_profiles
      const { data: profile } = await sb.from('user_profiles').select('role').eq('id', currentUser.id).single();
      if (profile && profile.role) {
          currentUserRole = profile.role;
      }
      
      const userDisplay = document.getElementById('user-display');
      if (currentUserRole === 'admin') {
          userDisplay.textContent = '👑 Admin: ' + studentId;
          userDisplay.style.background = 'var(--cork-orange-dark)';
          userDisplay.style.borderColor = 'var(--cork-orange-dark)';
      } else {
          userDisplay.textContent = '👤 ' + studentId;
      }

      document.body.style.display = 'block'; 
      initApp(); 
    }
  });

  document.getElementById('btn-logout').addEventListener('click', async () => {
    await sb.auth.signOut();
    window.location.href = 'index.html';
  });

  // ----------------------------------------------------
  // ข้อมูลพื้นฐาน & ตัวแปร State
  // ----------------------------------------------------
  const AREAS = [
    { id:'gym1', name:'ยิม 1 (มทส.)' }, { id:'gym2', name:'ยิม 2 (มทส.)' }
  ];
  const LEVELS = [
    { code:'OPEN', label:'เปิดทุกระดับ (เล่นด้วยกันได้)', hue:null },
    { code:'BG', label:'BG · มือใหม่สุดๆ', hue:150 }, { code:'N', label:'N · มือใหม่', hue:138 },
    { code:'S', label:'S · มือกลาง', hue:108 }, { code:'P', label:'P · มือกลาง-ดี', hue:80 },
    { code:'C', label:'C · มือดี', hue:46 }, { code:'B', label:'B · มือเซียน', hue:16 },
    { code:'A', label:'A · มือโปร', hue:355 }
  ];

  let allPosts = [], visiblePosts = [];
  let myRequests = []; // คำขอที่ฉันกดขอคนอื่น
  let myPostRequests = []; // คำขอที่คนอื่นขอมาในโพสต์ฉัน
  let filters = { type:'all', level:'all' };
  let currentOpenModalPostId = null;
  
  function showToast(msg){ const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2600); }
  function escapeHtml(str){ return String(str||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]); }
  function levelColor(code){ const lv = LEVELS.find(l=>l.code===code); return lv && lv.hue ? `hsl(${lv.hue}, 60%, 40%)` : '#6B7D74'; }
  function relTime(ts){ const m = Math.floor((Date.now()-ts)/60000); return m<1?'เมื่อสักครู่':m<60?`${m} นาทีที่แล้ว`:m<1440?`${Math.floor(m/60)} ชม.ที่แล้ว`:`${Math.floor(m/1440)} วันที่แล้ว`; }

  // ----------------------------------------------------
  // ระบบโหลดข้อมูล (Posts & Requests)
  // ----------------------------------------------------
  async function loadPosts(){
    const res = await sb.from('posts').select('*').order('created_at', { ascending: false });
    if(!res.error) {
      allPosts = res.data.map(r => ({
        id: r.id, userId: r.user_id, type: r.type, venue: r.venue, areaId: r.area_id, date: r.post_date,
        time: r.post_time||'', peopleNeeded: r.people_needed, level: r.level, details: r.details||'',
        nickname: r.nickname, contact: r.contact, createdAt: new Date(r.created_at).getTime()
      }));
    }
  }

  async function loadRequests() {
    if (!currentUser) return;
    
    // 1. โหลดคำขอที่ฉันกดเข้าร่วม
    const res1 = await sb.from('join_requests').select('*').eq('requester_id', currentUser.id);
    if (!res1.error) myRequests = res1.data;

    // 2. โหลดคำขอที่เข้ามายังโพสต์ของฉัน
    const myPostIds = allPosts.filter(p => p.userId === currentUser.id).map(p => p.id);
    if (myPostIds.length > 0) {
      // ดึงข้อมูล Join กับ user_profiles เพื่อเอา student_id มาแสดงใน Modal
      const res2 = await sb.from('join_requests')
        .select(`id, post_id, status, user_profiles(student_id)`)
        .in('post_id', myPostIds);
      if (!res2.error) myPostRequests = res2.data;
    } else {
      myPostRequests = [];
    }
  }

  // ----------------------------------------------------
  // UI Render (การแสดงผล Feed)
  // ----------------------------------------------------
  function renderFeed(){
    const list = document.getElementById('post-list');
    const empty = document.getElementById('empty-state');
    document.getElementById('loading-state').classList.add('hidden');
    
    visiblePosts = allPosts.filter(p => filters.type === 'all' || p.type === filters.type);

    if(!visiblePosts.length){
      list.classList.add('hidden'); empty.classList.remove('hidden');
      document.getElementById('result-count').textContent = '0 ประกาศ';
    } else {
      empty.classList.add('hidden'); list.classList.remove('hidden');
      document.getElementById('result-count').textContent = visiblePosts.length + ' ประกาศ';
      
      list.innerHTML = visiblePosts.map(p => {
        // เงื่อนไข Admin และเจ้าของโพสต์
        const isMine = currentUser && p.userId === currentUser.id;
        const isAdmin = currentUserRole === 'admin';
        const canDelete = isMine || isAdmin;
        
        // ปุ่มลบโพสต์ (Admin เห็นทุกคน, คนทั่วไปเห็นแค่ของตัวเอง)
        const delBtn = canDelete ? `<button type="button" class="icon-btn" onclick="deletePost('${p.id}')" title="ลบโพสต์">🗑️</button>` : '';
        
        // ลอจิกปุ่ม ขอเข้าร่วม / จัดการคำขอ
        let featureBtns = '';
        if (isMine) {
            // ของตัวเอง -> โชว์ปุ่ม "จัดการคำขอ" พร้อมตัวเลขแจ้งเตือนสีแดง (ถ้ามีคนรออยู่)
            const reqCount = myPostRequests.filter(r => r.post_id === p.id && r.status === 'pending').length;
            const badge = reqCount > 0 ? `<span style="background:red; color:white; border-radius:50%; padding:2px 6px; font-size:10.5px; margin-left:4px; font-weight:bold;">${reqCount}</span>` : '';
            featureBtns = `<button type="button" class="btn btn-secondary btn-sm" onclick="window.openRequestsModal('${p.id}')">จัดการคำขอ ${badge}</button>`;
        } else {
            // ของคนอื่น -> เช็คสถานะการขอเข้าร่วมของเรา
            const myReq = myRequests.find(r => r.post_id === p.id);
            if (!myReq) {
                featureBtns = `<button type="button" class="btn btn-primary btn-sm" onclick="window.requestToJoin('${p.id}', this)">ขอเข้าร่วม</button>`;
            } else if (myReq.status === 'pending') {
                featureBtns = `<button type="button" class="btn btn-ghost btn-sm" disabled>รอการตอบรับ...</button>`;
            } else if (myReq.status === 'approved') {
                featureBtns = `<button type="button" class="btn btn-sm" style="background:var(--court-green); color:white;" disabled>เข้าร่วมแล้ว 🎉</button>`;
            } else if (myReq.status === 'rejected') {
                featureBtns = `<button type="button" class="btn btn-sm" style="background:red; color:white;" disabled>ถูกปฏิเสธ/คิวเต็ม</button>`;
            }
        }

        const areaName = AREAS.find(a=>a.id===p.areaId)?.name || 'ไม่ระบุ';
        
        return `<article class="card ${p.type==='find_group'?'type-find':''}">
          <div class="card-top"><span class="badge ${p.type==='find_group'?'type-find':'type-need'}">${p.type==='find_group'?'หาก๊วนตี':'ก๊วนหาคน'}</span></div>
          <p class="venue">${escapeHtml(p.venue)}</p><p class="area">📍 ${escapeHtml(areaName)}</p>
          <div class="meta-row">
            <span class="meta-item">📅 ${escapeHtml(p.date)}</span>
            <span class="meta-item">👥 ${p.peopleNeeded} คน</span>
            <span class="level-pill" style="background:${levelColor(p.level)}">${escapeHtml(p.level)}</span>
          </div>
          <p class="contact">ติดต่อ: ${escapeHtml(p.contact)}</p>
          <div class="card-footer"><span class="by-line">โดย ${escapeHtml(p.nickname)} · ${relTime(p.createdAt)}</span>
          <div class="actions">${featureBtns}${delBtn}</div></div>
        </article>`;
      }).join('');
    }
  }

  // ----------------------------------------------------
  // ฟังก์ชันการทำงานต่างๆ (ลบ, ลงประกาศ, ขอเข้าร่วม, จัดการคำขอ)
  // ----------------------------------------------------
  window.deletePost = async function(id) {
    if(confirm('ยืนยันการลบประกาศนี้ใช่ไหม?')) {
      await sb.from('posts').delete().eq('id', id);
      allPosts = allPosts.filter(p => p.id !== id);
      renderFeed(); 
      showToast('ลบประกาศเรียบร้อยแล้ว');
    }
  }

  window.requestToJoin = async function(postId, btnEl) {
    if (!currentUser) return;
    btnEl.disabled = true;
    btnEl.textContent = 'กำลังส่งคำขอ...';

    const { data, error } = await sb.from('join_requests').insert([{
        post_id: postId,
        requester_id: currentUser.id
    }]).select().single();

    if (error) {
        showToast('เกิดข้อผิดพลาดในการส่งคำขอ');
        btnEl.disabled = false;
        btnEl.textContent = 'ขอเข้าร่วม';
    } else {
        myRequests.push(data);
        showToast('ส่งคำขอเข้าร่วมแล้ว รอเจ้าของตอบรับนะครับ');
        renderFeed();
    }
  }

  window.openRequestsModal = function(postId) {
    currentOpenModalPostId = postId;
    const reqs = myPostRequests.filter(r => r.post_id === postId);
    const listDiv = document.getElementById('req-list');
    
    if (reqs.length === 0) {
        listDiv.innerHTML = '<p style="text-align:center; color:var(--muted);">ยังไม่มีคนขอเข้าร่วมเลยครับ 🏸</p>';
    } else {
        listDiv.innerHTML = reqs.map(r => {
            const studentId = (r.user_profiles && r.user_profiles.student_id) ? r.user_profiles.student_id : 'ข้อมูลปกปิด';
            
            let statusHtml = '';
            let actionBtns = '';
            if (r.status === 'pending') {
                statusHtml = '<span style="color:var(--cork-orange);">รอการตอบรับ</span>';
                actionBtns = `
                    <div style="display:flex; gap:5px;">
                        <button class="btn btn-primary btn-sm" onclick="window.updateReqStatus('${r.id}', 'approved')">รับ</button>
                        <button class="btn btn-ghost btn-sm" onclick="window.updateReqStatus('${r.id}', 'rejected')">ปฏิเสธ</button>
                    </div>`;
            } else if (r.status === 'approved') {
                statusHtml = '<span style="color:var(--court-green); font-weight:bold;">อนุมัติแล้ว</span>';
            } else {
                statusHtml = '<span style="color:red;">ปฏิเสธแล้ว</span>';
            }

            return `
                <div class="req-item">
                    <div>
                        <strong>👤 ${escapeHtml(studentId)}</strong><br>
                        <span style="font-size:12px;">สถานะ: ${statusHtml}</span>
                    </div>
                    ${actionBtns}
                </div>
            `;
        }).join('');
    }
    
    document.getElementById('req-modal').classList.add('show');
  }

  window.closeRequestsModal = function() {
    currentOpenModalPostId = null;
    document.getElementById('req-modal').classList.remove('show');
  }

  window.updateReqStatus = async function(reqId, newStatus) {
    const { error } = await sb.from('join_requests').update({ status: newStatus }).eq('id', reqId);
    if (!error) {
        const req = myPostRequests.find(r => r.id === reqId);
        if (req) req.status = newStatus;
        showToast(newStatus === 'approved' ? 'รับเข้าร่วมก๊วนแล้ว!' : 'ปฏิเสธคำขอแล้ว');
        window.openRequestsModal(currentOpenModalPostId); // รีเฟรช Modal
        renderFeed(); // รีเฟรชหน้าหลักเผื่อตัวเลขแจ้งเตือนลดลง
    } else {
        showToast('เกิดข้อผิดพลาดในการอัปเดตสถานะ');
    }
  }

  // ----------------------------------------------------
  // Init & Setup
  // ----------------------------------------------------
  async function initApp() {
    document.getElementById('f-area').innerHTML = AREAS.map(a => `<option value="${a.id}">${a.name}</option>`).join('');
    document.getElementById('f-level').innerHTML = LEVELS.map(l => `<option value="${l.code}">${l.label}</option>`).join('');
    
    document.querySelectorAll('.chip[data-type]').forEach(chip => {
      chip.addEventListener('click', (e) => {
        document.querySelectorAll('.chip[data-type]').forEach(c => c.setAttribute('aria-pressed', 'false'));
        e.target.setAttribute('aria-pressed', 'true');
        filters.type = e.target.getAttribute('data-type');
        renderFeed();
      });
    });

    const pnl = document.getElementById('create-panel');
    document.getElementById('toggle-create').onclick = () => pnl.classList.remove('hidden');
    document.getElementById('cancel-create').onclick = () => pnl.classList.add('hidden');
    
    // จัดการตอนกดปุ่ม ลงประกาศ (ฟอร์ม)
    document.getElementById('post-form').addEventListener('submit', async function(ev){
      ev.preventDefault();
      const fd = new FormData(this);
      const data = {
        postType: fd.get('postType'), venue: fd.get('venue')||'', areaId: fd.get('areaId'),
        level: fd.get('level'), date: fd.get('date'), time: fd.get('time')||'',
        peopleNeeded: fd.get('peopleNeeded'), nickname: fd.get('nickname')||'',
        contact: fd.get('contact')||'', details: fd.get('details')||''
      };
      
      const submitBtn = this.querySelector('button[type="submit"]');
      submitBtn.disabled = true; submitBtn.textContent = 'กำลังบันทึก...';
      
      const { data: postData, error } = await sb.from('posts').insert([{
          user_id: currentUser.id, type: data.postType, venue: data.venue, area_id: data.areaId,
          post_date: data.date, post_time: data.time || null, people_needed: data.peopleNeeded,
          level: data.level, details: data.details || null, nickname: data.nickname, contact: data.contact
      }]).select().single();

      submitBtn.disabled = false; submitBtn.textContent = 'ลงประกาศ';
      if (!error && postData){
        await loadPosts(); // โหลดใหม่เพื่อให้แน่ใจว่าข้อมูลอัปเดตครบ
        renderFeed();
        pnl.classList.add('hidden');
        this.reset();
        showToast('ลงประกาศเรียบร้อยแล้ว 🏸');
      } else {
        showToast('เกิดข้อผิดพลาดในการลงประกาศ');
      }
    });

    await loadPosts();
    await loadRequests();
    renderFeed();
    
    // Realtime Sync สำหรับคำขอและโพสต์ (อัปเดตข้อมูลแบบสดๆ ไม่ต้องรีเฟรชหน้าเว็บ)
    sb.channel('realtime-all')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'posts' }, async () => {
        await loadPosts(); renderFeed();
      })
      .on('postgres_changes', { event: '*', schema: 'public', table: 'join_requests' }, async () => {
        await loadRequests(); 
        renderFeed();
        if (currentOpenModalPostId) window.openRequestsModal(currentOpenModalPostId);
      })
      .subscribe();
  }
})();
</script>
</body>
</html>
